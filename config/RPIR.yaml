structure:
    joint_rope:
        use: 'rope_attn'   # rope_attn_hgnn, rope_attn, attn, False
        num_heads: 4
        depth: 6
        GNN_num_layers: 3
    ind_rope:
        use: 'rope_attn'   # rope_attn_hgnn, rope_attn, attn, False
        num_heads: 4
        depth: 6
        coord_axis: ['x', 'topx']
        GNN_num_layers: 3
    joint_embedding:
        num_features: 128
dataset:
    name: 'volleyball'     # volleyball, nba
    volleyball:
        img_h: 720
        img_w: 1280
        workers: 8
        actions_num_classes: 9
        activities_num_classes: 8
        joint_features: '/mnt/disk/LiLinDong/GroupFormer-main/joint_features.pt'
        train:
            sample: 'train'
            batch_size: 16
            flip: true
            data_path_rgb: '/mnt/disk/LiLinDong/dataset/Volleyball/videos'
            tracks: '/mnt/disk/LiLinDong/dataset/Volleyball/tracks_normalized.pkl'
            keypoints: '/mnt/disk/LiLinDong/dataset/Volleyball/volleyball_result_kpt.json'
            data_fformation: '/mnt/disk/LiLinDong/GAR/my_code/data_processing/voll/voll_train.json'
            seqs: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38, 39, 40, 41, 42, 48, 50, 52, 53, 54, 0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
            orientation_num_classes: 8
            top_coordinate_x: [-90.64021548726014, 111.6840163861746]   # 俯视坐标x轴的范围
            top_coordinate_y: [8.0, 255.0]  # 俯视坐标y轴的范围（即深度）
        val:
            sample: 'val'
            batch_size: 16
            flip: false
            data_path_rgb: '/mnt/disk/LiLinDong/dataset/Volleyball/videos'
            tracks: '/mnt/disk/LiLinDong/dataset/Volleyball/tracks_normalized.pkl'
            keypoints: '/mnt/disk/LiLinDong/dataset/Volleyball/volleyball_result_kpt.json'
            data_fformation: '/mnt/disk/LiLinDong/GAR/my_code/data_processing/voll/voll_test.json'
            seqs: [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]
            orientation_num_classes: 8
            top_coordinate_x: [-90.64021548726014, 111.6840163861746]   # 俯视坐标x轴的范围
            top_coordinate_y: [8.0, 255.0]  # 俯视坐标y轴的范围（即深度）
    nba:
        workers: 8
        actions_num_classes: 9  # 实际上，NBA数据未标注个体动作标签
        activities_num_classes: 9
        train:
            sample: 'train'
            batch_size: 16
            flip: true
            data_skeleton: '/mnt/disk/LiLinDong/GroupFormer-main/NBA_data_skeleton/train_data.npy'
            data_label: '/mnt/disk/LiLinDong/GroupFormer-main/NBA_data_skeleton/train_label.pkl'
        val:
            sample: 'val'
            batch_size: 16
            flip: false
            data_skeleton: '/mnt/disk/LiLinDong/GroupFormer-main/NBA_data_skeleton/eval_data.npy'
            data_label: '/mnt/disk/LiLinDong/GroupFormer-main/NBA_data_skeleton/eval_label.pkl'
train:
    start_epoch: 0
    criterion: ce_loss
    actions_weight: [1., 1., 2., 3., 1., 2., 2., 0.2, 1.]
    activities_weight: [1., 1., 1., 1., 1., 1., 1., 1.] # volleyball
#    activities_weight: [1., 1., 1., 1., 1., 1., 1., 1., 1.] # nba
    action_loss: False
    scheduler:
        epochs: 150
        milestones: [30, 60, 90, 120]
        gamma: 0.1
    optimizer:
        type: Adam
        kwargs:
            lr: 0.0001
            # momentum: 0.9
    print_freq: 1000
    pretrain: null

common:
    seed: 42
